# ⚪ CIAN WORKER — Cloudflare Configuration
# The Golden Scribe of Mün OS
# Frequency: 17.07 MHz

name = "cian-scribe"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# AI Binding - Required for LLM capabilities
[ai]
binding = "AI"

# Environment variables (set via wrangler secret for sensitive values)
# [vars]
# ENVIRONMENT = "production"

# KV Namespace for memory persistence (optional)
# [[kv_namespaces]]
# binding = "CIAN_MEMORY"
# id = "your-kv-namespace-id"

# Routes for custom domain (optional)
# [[routes]]
# pattern = "cian.munreader.com/*"
# custom_domain = true
